<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <p>Rock Paper Scissors</p>

    <button onclick="playRound('rock')">Rock</button>
    <button onclick="playRound('paper')">Paper</button>
    <button onclick="playRound('scissors')">Scissors</button>

    <script>
      function pickCompMove() {
        const randomNumber = Math.random();

        if (randomNumber < 1 / 3) {
          return 'rock';
        } else if (randomNumber < 2 / 3) {
          return 'paper';
        } else {
          return 'scissors';
        }
      }

      function playRound(playerMove) {
        const compMove = pickCompMove();
        let result = '';

        if (playerMove === compMove) {
          result = 'Tie.';
        } else if (
          (playerMove === 'rock' && compMove === 'scissors') ||
          (playerMove === 'paper' && compMove === 'rock') ||
          (playerMove === 'scissors' && compMove === 'paper')
        ) {
          result = 'You win.';
        } else {
          result = 'You lose.';
        }

        alert(`You picked ${playerMove}. Computer picked ${compMove}. ${result}`);
      }
    </script>
  </body>
</html>
