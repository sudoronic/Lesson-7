<!DOCTYPE html>
<html lang="en">
<head>
  <title>Interactive</title>
</head>
<body>
  <P>Greetings !</P>
  <button onclick="greet('ronic')">Ronic</button>
  <button onclick="greet('Eric');">Eric</button>
  <script>
    function greet(name) {
      alert(`Hello World ${name}!!`);
      console.log('hello');
    }
  </script>
</body>
</html>
