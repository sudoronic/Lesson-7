<!DOCTYPE html>
<html lang="en">
<head>
  <title>Cel->Fah</title>
</head>
<body>
<p>Celcius to Fahrenhiet !</p>
  <script>
    let fah = 0;
    function celtofah(cel)
    {
      fah = (cel*9/5)+32;
      alert(`celsius ${cel} in fahrenhiet is ${fah}`);
    }
    celtofah(77);
  </script>
</body>
</html>
