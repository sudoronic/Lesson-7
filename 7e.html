<!DOCTYPE html>
<html lang="en">
<head>
  <title>Fah->Cel</title>
</head>
<body>
  <p>Fahrehiet to Celsius Convertor Concept Using Functions</p>
  <script>
    let cel = 0 ;
    function fahtocel(fah)
    {
      cel = Math.round((fah-32)*5/9);
      alert(`In ${fah} converted to Celsius ${cel}`);

    }
    fahtocel(30);
    fahtocel(86);
  </script>
</body>
</html>
